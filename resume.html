<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume | Ashley Hu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#eef7f4;
    --card:#ffffff;
    --blue:#d8eef3;
    --green:#d8f0df;
    --text:#263535;
    --accent:#6f9188;
    --shadow:0 10px 30px rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:linear-gradient(180deg, #f8fffd 0%, #eef7f4 100%);
    min-height:100vh;
}

h1,h2,h3{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
}

/* NAV */

nav{
    position:fixed;
    top:0;
    width:100%;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
    padding:18px 10%;
}

.nav-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:600;
    text-decoration:none;
    color:var(--text);
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav a{
    text-decoration:none;
    color:var(--text);
}

/* PAGE */

.page-header{
    padding: 140px 10% 40px;
}

.back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:var(--accent);
    font-weight:600;
    font-size:0.9rem;
    margin-bottom:24px;
    transition:gap 0.2s;
}

.back-link:hover{ gap:12px; }
.back-link::before{ content:"←"; }

.header-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.page-title{
    font-size:4rem;
    line-height:1;
}

.btn{
    padding:14px 28px;
    border-radius:999px;
    text-decoration:none;
    transition:0.3s;
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
    font-weight:500;
    cursor:pointer;
    border:none;
}

.btn-primary{
    background:var(--accent);
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

/* PDF PREVIEW */

.preview-wrap{
    padding: 0 10% 80px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
}

.pdf-frame{
    width:100%;
    max-width:860px;
    height:1100px;
    border:none;
    border-radius:20px;
    box-shadow:var(--shadow);
    background:white;
}

.fallback{
    display:none;
    width:100%;
    max-width:860px;
    background:white;
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:60px;
    text-align:center;
}

.fallback p{
    margin-bottom:24px;
    color:#4a6060;
    line-height:1.7;
}

footer{
    text-align:center;
    padding:40px;
    opacity:0.7;
    border-top:1px solid rgba(111,145,136,0.15);
}

@media(max-width:900px){
    .page-title{ font-size:2.8rem; }
    .pdf-frame{ height:700px; }
    .header-row{ flex-direction:column; align-items:flex-start; }
}

</style>
</head>

<body>

<nav>
    <div class="nav-content">
        <a class="logo" href="index.html">Ashley Hu</a>

        <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </div>
</nav>

<div class="page-header">
    <a href="index.html" class="back-link">Back to home</a>
    <div class="header-row">
        <h1 class="page-title">Resume</h1>
        <a class="btn btn-primary" href="resume.pdf" download>Download PDF</a>
    </div>
</div>

<div class="preview-wrap">
    <iframe
        class="pdf-frame"
        src="resume.pdf"
        title="Ashley Hu Resume"
        onerror="document.querySelector('.pdf-frame').style.display='none'; document.querySelector('.fallback').style.display='block';">
    </iframe>

    <!-- shown if iframe fails (e.g. mobile browsers that don't embed PDFs) -->
    <div class="fallback">
        <p>PDF preview isn't available in this browser. Download the file to view it.</p>
        <a class="btn btn-primary" href="resume.pdf" download>Download PDF</a>
    </div>
</div>

<footer>
    © 2026 Ashley Hu
</footer>

</body>
</html>
